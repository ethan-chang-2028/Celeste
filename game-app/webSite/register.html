<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Platformer - Register</title>
    <link rel="stylesheet" href="/style.css">
</head>
    <style>
        /* Global Reset and Body Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0e14; /* Deep midnight background from the image */
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Central Container (Kept name to match login page) */
        .login-container {
            background-color: #121721; /* Slightly lighter dark blue for the card */
            border: 1px solid #1e2633;  /* Subtle border matching the level panels */
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }

        /* Headings */
        h1 {
            color: #f5cd5d; /* Exactly matching the gold CELESTE header */
            text-align: center;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        h2 {
            color: #7a8b9e; /* Soft blue-gray subtext */
            text-align: center;
            font-size: 1rem;
            font-weight: 400;
            margin-bottom: 30px;
        }

        /* Form Layout & Inputs */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #8a99ad;
            font-size: 0.85rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Form Fields: Text, Email, Password, and Dropdowns */
        input[type="text"],
        input[type="email"],
        input[type="password"],
        select {
            width: 100%;
            padding: 12px;
            background-color: #0b0e14; /* Dark input slots */
            border: 1px solid #2c3747;
            border-radius: 4px;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        /* Style for the dropdown arrow and options box */
        select {
            cursor: pointer;
            appearance: none; /* Removes default browser styling */
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' fill='%237a8b9e'><polygon points='0,0 10,0 5,5'/></svg>");
            background-repeat: no-repeat;
            background-position: right 15px center;
        }

        select option {
            background-color: #121721; /* Keeps dropdown choices matching the dark card */
            color: #ffffff;
        }

        /* Placeholder Text Color styling */
        ::placeholder {
            color: #4a5768;
        }

        /* Glow effect when user is actively typing or selecting */
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        select:focus {
            border-color: #46ee9d; /* Tech green accent color */
        }

        /* Action Button */
        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background-color: #0b57d0; /* Blue button color */
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        button[type="submit"]:hover {
            background-color: #1a69e5;
        }

        button[type="submit"]:active {
            transform: scale(0.98);
        }

        /* Messaging Text Styles */
        #errorMessage, #successMessage {
            font-size: 0.85rem;
            margin-bottom: 15px;
            text-align: center;
        }

        #successMessage {
            color: #46ee9d !important; /* Uses the UI's clean green color */
        }

        /* Links Section */
        .links {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #1e2633;
            text-align: center;
            font-size: 0.85rem;
        }

        .links p {
            color: #7a8b9e;
        }

        .links a {
            color: #f5cd5d; /* Gold link text */
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .links a:hover {
            color: #ffffff;
            text-decoration: underline;
        }
    </style>
<body>
    <main class="login-container">
        <h1>Apex Platformer</h1>
        <h2>Create Account</h2>

        <form id="registerForm">
            <div class="form-group">
                <label for="usernameInput">Username</label>
                <input type="text" id="usernameInput" required>
            </div>

            <div class="form-group">
                <label for="emailInput">Email</label>
                <input type="email" id="emailInput" required>
            </div>

            <div class="form-group">
                <label for="passwordInput">Password</label>
                <input type="password" id="passwordInput" required minlength="6">
            </div>

            <div class="form-group">
                <label for="countryInput">Country</label>
                <input type="text" id="countryInput" placeholder="e.g. Canada" required>
            </div>

            <div class="form-group">
                <label for="avatarInput">Avatar</label>
                <select id="avatarInput">
                    <option value="Madeline">Madeline</option>
                    <option value="Badeline">Badeline</option>
                    <option value="Granny">Granny</option>
                    <option value="Theo">Theo</option>
                </select>
            </div>

            <p id="errorMessage" style="color: red; display: none;"></p>
            <p id="successMessage" style="color: green; display: none;"></p>

            <button type="submit">Create Account</button>
        </form>

        <div class="links">
            <p>Already have an account? <a href="/">Login here</a></p>
        </div>
    </main>

    <script src="/register.js"></script>
</body>
</html>
