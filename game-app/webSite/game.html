<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celeste — Game Test</title>
    <link rel="stylesheet" href="/game.css">
</head>
<body>
    <header class="game-header">
        <h1>Celeste — Test Scene</h1>
        <a href="/" class="back-link">&larr; Back to menu</a>
    </header>

    <main class="game-main">
        <canvas id="game-canvas" width="320" height="180"></canvas>
        <div class="controls">
            <p><strong>Controls (Celeste keybinds):</strong>
                Arrow keys to move &middot;
                <kbd>C</kbd> jump &middot;
                <kbd>X</kbd> dash (8-directional) &middot;
                <kbd>Z</kbd> / <kbd>Shift</kbd> grab walls &middot;
                <kbd>R</kbd> reset
            </p>
            <p id="status">Ready.</p>
        </div>
    </main>

    <script src="/player.js"></script>
    <script src="/game.js"></script>
</body>
</html>
