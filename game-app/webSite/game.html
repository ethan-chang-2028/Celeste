<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celeste — Game Test</title>
    <link rel="stylesheet" href="/game.css">
</head>
<body>
    <header class="game-header">
        <h1>Celeste — Test Scene</h1>
        <a href="/" class="back-link">&larr; Back to menu</a>
    </header>

    <main class="game-main">
        <canvas id="game-canvas" width="960" height="540"></canvas>
        <div class="controls">
            <p><strong>Controls:</strong> &larr; / &rarr; or A / D to move, Space or &uarr; to jump, R to reset.</p>
            <p id="status">Ready.</p>
        </div>
    </main>

    <script src="/game.js"></script>
</body>
</html>
