<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Platformer — Leaderboard</title>
    <link rel="stylesheet" href="/game.css">
    <style>
        .nav-row { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
        .lb-page { max-width: 920px; margin: 0 auto; padding: 2rem 1.5rem 3rem; }

        .tabs { display: flex; flex-wrap: wrap; gap: .6rem; margin-bottom: 1.2rem; }
        .tab {
            background: #11131c; color: #9aa6c4; border: 1px solid #2a2f42;
            border-radius: 8px; padding: .55rem 1rem; font-size: .9rem; font-weight: 600;
            cursor: pointer; transition: background .12s, color .12s, border-color .12s;
        }
        .tab:hover { color: #e6e8ef; border-color: #3a4a66; }
        .tab.active { background: #1b2741; color: #fff; border-color: #46ee9d; }
        .subtitle { color: #7a82a6; font-size: .85rem; margin: 0 0 1rem; }

        table { width: 100%; border-collapse: collapse; background: #11131c; border: 1px solid #2a2f42; border-radius: 10px; overflow: hidden; }
        th, td { padding: .7rem 1rem; text-align: left; font-size: .88rem; }
        thead th {
            color: #7aa2ff; font-size: .72rem; text-transform: uppercase; letter-spacing: .08em;
            border-bottom: 1px solid #2a2f42; cursor: pointer; user-select: none; white-space: nowrap;
        }
        thead th .arrow { color: #f5cd5d; font-size: .7rem; }
        tbody tr { border-top: 1px solid #1c2030; transition: background .12s; }
        tbody tr:hover { background: #181c2b; }
        td.rank { font-family: monospace; color: #f5cd5d; }
        td.rank.silver { color: #c0c0c0; }
        td.rank.bronze { color: #cd7f32; }
        td.time { font-family: monospace; }
        td.rate { font-family: monospace; font-weight: 700; color: #46ee9d; }
        td.record { color: #9aa6c4; font-size: .82rem; }
        .country { color: #5a627e; font-size: .78rem; }
        .empty { text-align: center; color: #7a82a6; padding: 2rem; }
    </style>
</head>
<body>

<header class="game-header">
    <h1>Apex Platformer</h1>
    <nav class="nav-row">
        <a href="/home.html" class="back-link">Home</a>
        <a href="/game.html" class="back-link">Play</a>
        <a href="/achievements.html" class="back-link">Achievements</a>
        <a href="/profile.html" class="back-link">Profile</a>
        <a href="/" class="back-link">&larr; Menu</a>
    </nav>
</header>

<main class="lb-page">
    <h2 style="margin:0 0 1.2rem;">Global Leaderboard</h2>

    <div class="tabs" id="tabs">
        <button class="tab active" data-board="ai">🤖 AI Win Rate</button>
        <button class="tab" data-board="pvp">⚔️ PvP Win Rate</button>
        <button class="tab" data-board="maze">🪞 Mirror Temple</button>
        <button class="tab" data-board="mountain">🔥 Heart of the Mountain</button>
    </div>
    <p class="subtitle" id="subtitle"></p>

    <table>
        <thead id="lbHead"></thead>
        <tbody id="lbBody">
            <tr><td class="empty">Loading…</td></tr>
        </tbody>
    </table>
</main>

<script src="/platform-data.js"></script>
<script src="/leaderboard.js"></script>
</body>
</html>
