<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Platformer - My Profile</title>
    <link rel="stylesheet" href="../webSite/style.css">
    <style>
        .profile-container { max-width: 680px; margin: 40px auto; padding: 20px; text-align: center; font-family: sans-serif; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-box { background: #eee; padding: 15px; border-radius: 8px; }
        .stat-box h4 { margin: 0 0 8px; font-size: 0.85rem; color: #555; }
        .stat-box p  { margin: 0; font-size: 1.6rem; font-weight: bold; color: #222; }
        .ai-box { background: #1a1a2e; color: #ccc; }
        .ai-box h4 { color: #44ff44; }
        .ai-box p  { color: #aaffaa; }
        .section-title { margin: 28px 0 4px; font-size: 1.1rem; }
        .logout-btn { margin-top: 30px; background: #ff4c4c; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <main class="profile-container">
        <h1>Player Profile</h1>

        <div id="userInfo">
            <h2 id="displayUsername">Loading...</h2>
            <p><strong>Email:</strong> <span id="displayEmail">...</span></p>
            <p><strong>Role:</strong> <span id="displayRole">...</span></p>
        </div>

        <hr>

        <h3 class="section-title">My Stats</h3>
        <div class="stats-grid">
            <div class="stat-box">
                <h4>Dashes</h4>
                <p id="statDashes">0</p>
            </div>
            <div class="stat-box">
                <h4>Deaths</h4>
                <p id="statDeaths">0</p>
            </div>
            <div class="stat-box">
                <h4>Berries</h4>
                <p id="statBerries">0</p>
            </div>
            <div class="stat-box">
                <h4>Golden Berries</h4>
                <p id="statGoldenBerries">0</p>
            </div>
        </div>

        <h3 class="section-title">AI Global Stats</h3>
        <div class="stats-grid">
            <div class="stat-box ai-box">
                <h4>Generation</h4>
                <p id="aiGeneration">--</p>
            </div>
            <div class="stat-box ai-box">
                <h4>Total Runs</h4>
                <p id="aiRunCount">--</p>
            </div>
            <div class="stat-box ai-box">
                <h4>Best Time</h4>
                <p id="aiBestTime">--</p>
            </div>
            <div class="stat-box ai-box">
                <h4>Best Fitness</h4>
                <p id="aiBestFit">--</p>
            </div>
        </div>

        <button id="logoutButton" class="logout-btn">Log Out</button>
        <button onclick="window.location.href='game.html'" class="play-button">
          Play the Game!
        </button>
        <button onclick="window.location.href='admin.html'" class="play-button">
          Admin
        </button>
    </main>

    <script src="profile.js"></script>
</body>
</html>
